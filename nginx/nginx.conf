worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    # Upstream cho Frontend
    upstream frontend {
        server host.docker.internal:3000;
    }

    # Upstream cho GraphQL Gateway
    upstream graphql_gateway {
        server host.docker.internal:4000;
    }

    # Cấu hình HTTP Server (Reverse Proxy)
    server {
        listen 80;
        server_name localhost;

        # Proxy cho GraphQL API
        location /graphql {
            proxy_pass http://graphql_gateway/graphql;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Hỗ trợ WebSockets / Subscriptions nếu có
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Proxy cho Frontend
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
    
    # Upstream cho Trip Service (gRPC Load Balancing)
    upstream trip_service_grpc {
        server host.docker.internal:50052;
    }

    # Cấu hình gRPC Server Load Balancing
    server {
        listen 50052 http2;
        server_name localhost;

        location / {
            grpc_pass grpc://trip_service_grpc;
            error_page 502 = /error502grpc;
        }
        
        location = /error502grpc {
            internal;
            default_type application/grpc;
            add_header grpc-status 14;
            add_header grpc-message "unavailable";
            return 204;
        }
    }
}
